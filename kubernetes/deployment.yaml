apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapiwebappdep
  namespace: test-ns
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fastapiwebapp
  template:
    metadata:
      name: fastapiwebapp
      labels:
        app: fastapiwebapp
    spec:
      containers:
      - name: fatapiwebapp
        image: 906353/devops-rajendra:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fastapiwebappsvc
  namespace: test-ns
spec:
  type: NodePort
  selector:
    app: fastapiwebapp
  ports:
  - port: 80
    targetPort: 8080
